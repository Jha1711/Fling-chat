<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Chat UI</title>

<style>
body {margin:0;font-family:Arial;background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;}
.app {width:360px;height:640px;background:#0d0d0d;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;}
.header {padding:15px;font-size:20px;font-weight:bold;}
.search {padding:10px;}
.search input {width:100%;padding:10px;border-radius:10px;border:none;background:#1a1a1a;color:white;}
.chat-list {flex:1;overflow-y:auto;}
.chat-item {display:flex;align-items:center;padding:12px;border-bottom:1px solid #111;cursor:pointer;}
.avatar {width:40px;height:40px;border-radius:50%;background:pink;margin-right:10px;}
.chat-info {flex:1;}
.chat-name {font-weight:bold;}
.chat-msg {font-size:12px;color:gray;}
.time {font-size:12px;color:gray;}
.chat-screen {display:none;flex-direction:column;height:100%;}
.chat-header {padding:15px;border-bottom:1px solid #111;cursor:pointer;}
.messages {flex:1;padding:10px;overflow-y:auto;}
.msg {max-width:70%;padding:10px;border-radius:10px;margin:5px 0;}
.sent {background:#d4f1a7;color:black;margin-left:auto;}
.received {background:#334155;}
.input-box {display:flex;padding:10px;border-top:1px solid #111;}
.input-box input {flex:1;padding:10px;border-radius:10px;border:none;background:#1a1a1a;color:white;}
.input-box button {margin-left:5px;padding:10px;border:none;border-radius:10px;background:#22c55e;color:white;}
</style>
</head>

<body>

<div class="app">

  <!-- Chat List -->
  <div id="listScreen">
    <div class="header">Nearby Users</div>
    <div class="search"><input placeholder="Search" /></div>

    <div class="chat-list"></div>
  </div>

  <!-- Chat Screen -->
  <div id="chatScreen" class="chat-screen">
    <div class="chat-header" onclick="back()">⬅ Back</div>
    <div id="messages" class="messages"></div>

    <div class="input-box">
      <input id="msgInput" placeholder="Type message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// ===============================
// FIREBASE CONFIG
// ===============================
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "fling-chat-95e81.firebaseapp.com",
  databaseURL: "https://fling-chat-95e81-default-rtdb.firebaseio.com/",
  projectId: "fling-chat-95e81",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===============================
// USER SETUP
// ===============================
const userId = "user_" + Math.floor(Math.random() * 10000);
const userName = "User" + Math.floor(Math.random() * 1000);

// Save user location
navigator.geolocation.getCurrentPosition(pos => {
  db.ref("users/" + userId).set({
    name: userName,
    lat: pos.coords.latitude,
    lng: pos.coords.longitude
  });
});

// ===============================
// DISTANCE FUNCTION
// ===============================
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI/180;
  const dLon = (lon2 - lon1) * Math.PI/180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// ===============================
// SHOW NEARBY USERS
// ===============================
function loadNearbyUsers() {
  db.ref("users").on("value", snap => {
    const users = snap.val();
    if (!users || !users[userId]) return;

    const my = users[userId];
    const list = document.querySelector(".chat-list");
    list.innerHTML = "";

    for (let id in users) {
      if (id === userId) continue;

      const u = users[id];
      const dist = getDistance(my.lat, my.lng, u.lat, u.lng);

      if (dist <= 50) {
        const div = document.createElement("div");
        div.className = "chat-item";

        div.innerHTML = `
          <div class="avatar"></div>
          <div class="chat-info">
            <div class="chat-name">${u.name}</div>
            <div class="chat-msg">${dist.toFixed(1)} km away</div>
          </div>
          <div class="time">Nearby</div>
        `;

        div.onclick = () => startChat(id);
        list.appendChild(div);
      }
    }
  });
}

setTimeout(loadNearbyUsers, 2000);

// ===============================
// CHAT SYSTEM
// ===============================
let currentChat = null;

function startChat(otherUserId) {
  currentChat = "chat_" + userId + "_" + otherUserId;

  document.getElementById("messages").innerHTML = "";
  openChat();
  listenMessages(currentChat);
}

// ===============================
// SEND MESSAGE (✓)
// ===============================
function sendMessage() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text || !currentChat) return;

  const ref = db.ref("chats/" + currentChat + "/messages").push();

  ref.set({
    text,
    sender: userId,
    status: "sent"
  });

  input.value = "";
}

// ===============================
// RECEIVE + ✓✓
// ===============================
const messagesDiv = document.getElementById("messages");

function listenMessages(chatId) {
  db.ref("chats/" + chatId + "/messages").on("child_added", snap => {
    const msg = snap.val();
    const key = snap.key;

    const div = document.createElement("div");
    div.classList.add("msg");

    let tick = msg.status === "delivered" ? "✓✓" : "✓";

    if (msg.sender === userId) {
      div.classList.add("sent");
      div.innerText = msg.text + " " + tick;

      div.onclick = () => {
        if (confirm("Delete for everyone?")) {
          db.ref("chats/" + chatId + "/messages/" + key).remove();
          div.remove();
        }
      };

    } else {
      div.classList.add("received");
      div.innerText = msg.text;

      db.ref("chats/" + chatId + "/messages/" + key)
        .update({ status: "delivered" });
    }

    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

// ===============================
// UI NAVIGATION
// ===============================
function openChat() {
  document.getElementById("listScreen").style.display = "none";
  document.getElementById("chatScreen").style.display = "flex";
}

function back() {
  document.getElementById("listScreen").style.display = "block";
  document.getElementById("chatScreen").style.display = "none";
}
</script>

</body>
</html>
