<script>
// ===============================
// FIREBASE SETUP
// ===============================
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "fling-chat-95e81.firebaseapp.com",
  databaseURL: "https://fling-chat-95e81-default-rtdb.firebaseio.com/",
  projectId: "fling-chat-95e81",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===============================
// USER SETUP
// ===============================
const userId = "user_" + Math.floor(Math.random() * 10000);
const userName = "User" + Math.floor(Math.random() * 1000);

// Save user with location
navigator.geolocation.getCurrentPosition(pos => {
  db.ref("users/" + userId).set({
    name: userName,
    lat: pos.coords.latitude,
    lng: pos.coords.longitude
  });
});

// ===============================
// DISTANCE (50KM FILTER)
// ===============================
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI/180;
  const dLon = (lon2 - lon1) * Math.PI/180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) *
    Math.sin(dLon/2);

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// ===============================
// FIND NEARBY USERS (SHOW IN UI)
// ===============================
function findNearbyUsers() {
  db.ref("users").once("value", snap => {
    const users = snap.val();
    if (!users[userId]) return;

    const myData = users[userId];
    const list = document.querySelector(".chat-list");
    list.innerHTML = "";

    for (let id in users) {
      if (id === userId) continue;

      const u = users[id];
      const dist = getDistance(myData.lat, myData.lng, u.lat, u.lng);

      if (dist <= 50) {
        const div = document.createElement("div");
        div.className = "chat-item";
        div.innerHTML = `
          <div class="avatar"></div>
          <div class="chat-info">
            <div class="chat-name">${u.name}</div>
            <div class="chat-msg">${dist.toFixed(1)} km away</div>
          </div>
          <div class="time">Nearby</div>
        `;

        div.onclick = () => startChat(id);
        list.appendChild(div);
      }
    }
  });
}

// Auto load nearby users
setTimeout(findNearbyUsers, 2000);

// ===============================
// CHAT SYSTEM
// ===============================
let currentChat = null;

function startChat(otherUserId) {
  const chatId = "chat_" + Date.now();

  db.ref("userChats/" + userId + "/" + chatId).set(true);
  db.ref("userChats/" + otherUserId + "/" + chatId).set(true);

  currentChat = chatId;

  document.getElementById("messages").innerHTML = ""; // no old chat
  openChat();
  listenMessages(chatId);
}

// ===============================
// SEND MESSAGE (✓)
// ===============================
function sendMessage() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text || !currentChat) return;

  const msgId = db.ref("chats/" + currentChat + "/messages").push().key;

  db.ref("chats/" + currentChat + "/messages/" + msgId).set({
    text,
    sender: userId,
    status: "sent",
    time: Date.now()
  });

  input.value = "";
}

// ===============================
// RECEIVE + DOUBLE TICK (✓✓)
// ===============================
const messagesDiv = document.getElementById("messages");

function listenMessages(chatId) {
  db.ref("chats/" + chatId + "/messages")
    .limitToLast(50)
    .on("child_added", snap => {

      const msg = snap.val();
      const msgKey = snap.key;

      const div = document.createElement("div");
      div.classList.add("msg");

      let tick = "✓";
      if (msg.status === "delivered") tick = "✓✓";

      if (msg.sender === userId) {
        div.classList.add("sent");
        div.innerText = msg.text + " " + tick;

        // DELETE OPTION (long press simulation)
        div.onclick = () => {
          if (confirm("Delete for everyone?")) {
            deleteMessage(chatId, msgKey);
            div.remove();
          }
        };

      } else {
        div.classList.add("received");
        div.innerText = msg.text;

        // mark delivered
        db.ref("chats/" + chatId + "/messages/" + msgKey)
          .update({ status: "delivered" });
      }

      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
}

// ===============================
// DELETE FOR EVERYONE
// ===============================
function deleteMessage(chatId, msgId) {
  db.ref("chats/" + chatId + "/messages/" + msgId).remove();
}

// ===============================
// UI NAVIGATION (UNCHANGED)
// ===============================
function openChat() {
  document.getElementById("listScreen").style.display = "none";
  document.getElementById("chatScreen").style.display = "flex";
}

function back() {
  document.getElementById("listScreen").style.display = "block";
  document.getElementById("chatScreen").style.display = "none";
}
</script>
