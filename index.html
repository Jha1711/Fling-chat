<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Chat App</title>

<style>
body {margin:0;font-family:Arial;background:#111;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;}
.app {width:380px;height:680px;background:#0b141a;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;}
.header {background:#202c33;padding:15px;display:flex;justify-content:space-between;align-items:center;}
.chat-list {flex:1;overflow-y:auto;}
.chat-item {display:flex;align-items:center;padding:12px;border-bottom:1px solid #222;cursor:pointer;}
.avatar {width:45px;height:45px;border-radius:50%;background:#25d366;margin-right:10px;}
.chat-info {flex:1;}
.chat-name {font-weight:bold;}
.unread {background:red;color:white;border-radius:50%;padding:3px 7px;font-size:12px;}
.chat-screen {display:none;flex-direction:column;height:100%;}
.messages {flex:1;padding:10px;overflow-y:auto;}
.msg {max-width:70%;padding:10px;border-radius:10px;margin:5px 0;}
.sent {background:#005c4b;margin-left:auto;}
.received {background:#202c33;}
.input-box {display:flex;padding:10px;background:#202c33;}
.input-box input {flex:1;padding:12px;border-radius:20px;border:none;background:#2a3942;color:white;}
.typing {font-size:12px;color:#aaa;padding-left:10px;}
</style>
</head>
<body>

<div class="app">

<div id="loginScreen" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%">
  <input id="username" placeholder="Enter name" />
  <button onclick="login()">Enter</button>
</div>

<div id="listScreen" style="display:none">
  <div class="header">Chats</div>
  <div id="userList" class="chat-list"></div>
</div>

<div id="chatScreen" class="chat-screen">
  <div class="header">
    <span onclick="back()">⬅</span>
    <span id="chatName"></span>
    <span onclick="deleteChat()">🗑️</span>
  </div>
  <div id="messages" class="messages"></div>
  <div class="typing" id="typing"></div>
  <div class="input-box">
    <input id="msgInput" placeholder="Message" oninput="typingStatus(true)" />
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "fling-chat-95e81.firebaseapp.com",
  databaseURL: "https://fling-chat-95e81-default-rtdb.firebaseio.com/",
  projectId: "fling-chat-95e81",
};

firebase.initializeApp(firebaseConfig);

let userId="";
let currentChat="";
let db;
const usersRef=firebase.database().ref("users");

function login(){
 let name=document.getElementById("username").value.trim();
 if(!name)return;
 name=name+"_"+Math.floor(Math.random()*1000);
 userId=name;
 usersRef.child(userId).set(true);
 document.getElementById("loginScreen").style.display="none";
 document.getElementById("listScreen").style.display="block";
 loadUsers();
}

function loadUsers(){
 usersRef.on("value",snap=>{
  const list=document.getElementById("userList");
  list.innerHTML="";
  snap.forEach(c=>{
    const id=c.key;
    if(id===userId)return;
    const div=document.createElement("div");
    div.className="chat-item";
    div.innerHTML=`<div class='avatar'></div><div class='chat-info'><div class='chat-name'>${id}</div></div><div id='count_${id}' class='unread' style='display:none'>0</div>`;
    div.onclick=()=>openChat(id);
    list.appendChild(div);
  });
 });
}

function openChat(other){
 currentChat=userId<other?userId+"_"+other:other+"_"+userId;
 db=firebase.database().ref("chats/"+currentChat);
 document.getElementById("chatName").innerText=other;
 document.getElementById("listScreen").style.display="none";
 document.getElementById("chatScreen").style.display="flex";
 const msgDiv=document.getElementById("messages");
 msgDiv.innerHTML="";
 db.off();
 db.on("child_added",snap=>{
  const d=snap.val();
  const div=document.createElement("div");
  div.className="msg "+(d.sender===userId?"sent":"received");
  div.innerText=d.text;
  msgDiv.appendChild(div);
  msgDiv.scrollTop=msgDiv.scrollHeight;
  if(d.sender!==userId){
    let badge=document.getElementById("count_"+other);
    if(badge){badge.style.display="block";badge.innerText=parseInt(badge.innerText||0)+1;}
  }
 });

 db.child("typing").on("value",snap=>{
  if(snap.val() && snap.val()!==userId){
    document.getElementById("typing").innerText="Typing...";
  }else{
    document.getElementById("typing").innerText="";
  }
 });
}

function sendMessage(){
 const input=document.getElementById("msgInput");
 const text=input.value.trim();
 if(!text)return;
 db.push({text, sender:userId});
 input.value="";
 typingStatus(false);
}

function typingStatus(status){
 if(db) db.child("typing").set(status?userId:null);
}

function deleteChat(){
 if(currentChat) firebase.database().ref("chats/"+currentChat).remove();
 document.getElementById("messages").innerHTML="";
}

function back(){
 document.getElementById("chatScreen").style.display="none";
 document.getElementById("listScreen").style.display="block";
}
</script>

</body>
</html>
