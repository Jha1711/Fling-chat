<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fling Chat - Live</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
/* UI STYLES */
body { margin:0; font-family:'Segoe UI', sans-serif; color:white; background: #0e1621; }
.dashboard { height:100vh; display:flex; justify-content:center; align-items:center; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
.card { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); padding:40px; border-radius:20px; text-align:center; width:300px; box-shadow:0 10px 40px rgba(0,0,0,0.5); }
.card input { width:100%; padding:12px; border:none; border-radius:25px; background:#1e2a38; color:white; margin-bottom:20px; text-align:center; box-sizing: border-box; }
.card button { width:100%; padding:12px; border:none; border-radius:25px; background: linear-gradient(45deg, #2aabee, #0088cc); color:white; font-size:16px; cursor:pointer; transition:0.3s; }
.card button:hover { transform:scale(1.05); }

#chatUI { height:100vh; display:none; flex-direction:column; }
.header { background:#17212b; padding:15px; display:flex; gap:10px; align-items: center; }
.header input { flex:1; padding:10px; border-radius:20px; border:none; background:#242f3d; color:white; }
.header button { background: none; border: none; font-size: 20px; cursor: pointer; color: white; }

.chat-box { flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap: 10px; }
.msg { max-width:70%; padding:12px; border-radius:15px; font-size: 14px; line-height: 1.4; }
.sent { background:#2b5278; align-self:flex-end; border-bottom-right-radius: 2px; }
.received { background:#182533; align-self:flex-start; border-bottom-left-radius: 2px; }

.user-card { padding:15px; background:#1e2a38; margin:8px 0; border-radius:12px; cursor:pointer; border-left: 4px solid #2aabee; transition: 0.2s; }
.user-card:hover { background: #242f3d; }

.input-box { display:flex; padding:15px; background:#17212b; }
.input-box input { flex:1; padding:12px; border-radius:25px; border:none; background:#242f3d; color:white; outline: none; }
.input-box button { margin-left:10px; width: 45px; height: 45px; border-radius:50%; border:none; background:#2aabee; color:white; cursor: pointer; }
</style>
</head>

<body>

<div id="dashboard" class="dashboard">
  <div class="card">
    <h1>💬 Fling Chat</h1>
    <p>Only active users shown.</p>
    <input id="username" placeholder="Enter your username">
    <button onclick="createUser()">Start Chatting</button>
  </div>
</div>

<div id="chatUI">
  <div class="header">
    <button onclick="goHome()">🏠</button>
    <input id="searchUser" placeholder="Search user ID...">
    <button onclick="findNearby()">📍</button>
  </div>

  <div id="chatBox" class="chat-box"></div>

  <div class="input-box">
    <input id="message" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
// 1. FIREBASE CONFIG
const firebaseConfig = {
  databaseURL: "https://fling-chat-95e81-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = "";
let chatRoom = "";

// 2. CREATE USER & HANDLE PRESENCE (THE FIX)
function createUser() {
  const nameInput = document.getElementById("username").value.trim();
  if (!nameInput) return alert("Please enter a username");
  currentUser = nameInput;

  const userRef = db.ref("users/" + currentUser);

  navigator.geolocation.getCurrentPosition(pos => {
    // This listener handles the online/offline logic automatically
    db.ref(".info/connected").on("value", (snapshot) => {
      if (snapshot.val() === true) {
        // When connected, set user data
        userRef.set({
          name: currentUser,
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          status: "online"
        });

        // CRITICAL: Automatically delete this node when the user closes the tab
        userRef.onDisconnect().remove();
      }
    });

    document.getElementById("dashboard").style.display = "none";
    document.getElementById("chatUI").style.display = "flex";

    findNearby(); // Show active users immediately
  }, () => {
    alert("Location access is required to see nearby active users.");
  });
}

// 3. FIND ONLY ACTIVE NEARBY USERS
function findNearby() {
  chatRoom = ""; // Reset chatroom when looking for users
  navigator.geolocation.getCurrentPosition(pos => {
    const lat1 = pos.coords.latitude;
    const lon1 = pos.coords.longitude;

    db.ref("users").on("value", snap => {
      // If we are currently in a private chat, don't overwrite the screen
      if (chatRoom !== "") return;

      let users = snap.val();
      let html = "<h3>Active Nearby</h3>";
      let count = 0;

      for (let key in users) {
        let u = users[key];
        let d = getDistance(lat1, lon1, u.lat, u.lng);

        // Only show OTHER users within 50km
        if (u.name !== currentUser && d <= 50) {
          html += `
            <div class="user-card" onclick="startChat('${u.name}')">
              <span style="color:#00ff88">●</span> <strong>${u.name}</strong>
              <div style="font-size:11px; color:#aaa; margin-top:5px;">${d.toFixed(1)} km away</div>
            </div>
          `;
          count++;
        }
      }

      document.getElementById("chatBox").innerHTML = count > 0 ? html : "No one else is online nearby.";
    });
  });
}

// 4. PRIVATE CHATING LOGIC
function startChat(user) {
  chatRoom = [currentUser, user].sort().join("_");
  document.getElementById("chatBox").innerHTML = `<p style="text-align:center">Loading chat with ${user}...</p>`;
  
  db.ref("chats/" + chatRoom).on("value", snapshot => {
    let data = snapshot.val();
    let html = `<h4>Chatting with ${user}</h4>`;

    if (!data) {
        html += "<p style='text-align:center; color:#aaa;'>No messages yet. Say hi!</p>";
    } else {
        for (let id in data) {
            let msg = data[id];
            let type = msg.sender === currentUser ? "sent" : "received";
            html += `<div class="msg ${type}">${msg.text}</div>`;
        }
    }
    
    let chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = html;
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

function sendMessage() {
  let msgInput = document.getElementById("message");
  let msg = msgInput.value.trim();
  if (!msg || !chatRoom) return;

  db.ref("chats/" + chatRoom).push({
    sender: currentUser,
    text: msg,
    timestamp: Date.now()
  });

  msgInput.value = "";
}

// 5. HELPER FUNCTIONS
function getDistance(lat1, lon1, lat2, lon2) {
  let R = 6371;
  let dLat = (lat2 - lat1) * Math.PI/180;
  let dLon = (lon2 - lon1) * Math.PI/180;
  let a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function goHome() {
  location.reload();
}

// SEARCH BAR LOGIC
document.getElementById("searchUser").addEventListener("change", function() {
  if(this.value) startChat(this.value);
});
</script>

</body>
</html>
