<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Anonymous Chat</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0e1621;
  color:white;
}

/* HEADER */
.header {
  background:#17212b;
  padding:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

.header input {
  flex:1;
  padding:8px;
  border-radius:20px;
  border:none;
  background:#242f3d;
  color:white;
}

/* CHAT */
.chat-box {
  height:70vh;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
}

.msg {
  max-width:65%;
  padding:10px;
  margin:5px 0;
  border-radius:15px;
}

.sent {
  background:#2b5278;
  align-self:flex-end;
}

.received {
  background:#182533;
  align-self:flex-start;
}

.tick {
  font-size:10px;
  text-align:right;
  opacity:0.7;
}

/* INPUT */
.input-box {
  display:flex;
  padding:10px;
  background:#17212b;
}

.input-box input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#242f3d;
  color:white;
}

.input-box button {
  margin-left:8px;
  padding:10px 15px;
  border:none;
  border-radius:50%;
  background:#2aabee;
  color:white;
}

/* TYPING */
.typing {
  font-size:12px;
  color:#aaa;
  padding-left:15px;
}

/* DASHBOARD */
.dashboard {
  text-align:center;
  padding:30px;
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
  <h2>Enter Username</h2>
  <input id="username" placeholder="Username"><br><br>
  <button onclick="createUser()">Start Chat</button>
</div>

<!-- CHAT UI -->
<div id="chatUI" style="display:none;">
  <div class="header">
    <button onclick="goHome()">🏠</button>
    <input id="searchUser" placeholder="Search user">
    <button onclick="findNearby()">📍</button>
  </div>

  <div id="chatBox" class="chat-box"></div>
  <div id="typingStatus" class="typing"></div>

  <div class="input-box">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
// 🔥 FIREBASE
const firebaseConfig = {
  databaseURL: "https://fling-chat-95e81-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// VARIABLES
let currentUser = "";
let chatRoom = "global";
let typingTimeout;

// CREATE USER
function createUser() {
  currentUser = document.getElementById("username").value;
  if (!currentUser) return alert("Enter username");

  navigator.geolocation.getCurrentPosition(pos => {
    db.ref("users/" + currentUser).set({
      name: currentUser,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    });
  });

  document.getElementById("dashboard").style.display = "none";
  document.getElementById("chatUI").style.display = "block";

  loadMessages();
  listenTyping();
}

// SEND MESSAGE
function sendMessage() {
  let msg = document.getElementById("message").value;
  if (!msg) return;

  let id = Date.now();

  db.ref("chats/" + chatRoom + "/" + id).set({
    sender: currentUser,
    text: msg,
    status: "sent"
  });

  document.getElementById("message").value = "";
}

// LOAD MESSAGES
function loadMessages() {
  db.ref("chats/" + chatRoom).on("value", snapshot => {
    let data = snapshot.val();
    if (!data) {
      document.getElementById("chatBox").innerHTML = "";
      return;
    }

    let html = "";

    for (let id in data) {
      let msg = data[id];
      let type = msg.sender === currentUser ? "sent" : "received";

      if (msg.sender !== currentUser && msg.status === "sent") {
        db.ref("chats/" + chatRoom + "/" + id).update({
          status: "delivered"
        });
      }

      let tick = "";
      if (msg.sender === currentUser) {
        tick = msg.status === "sent" ? "✔" : "✔✔";
      }

      html += `
        <div class="msg ${type}">
          ${msg.text}
          <div class="tick">${tick}</div>
        </div>
      `;
    }

    let chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = html;
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// SEARCH USER CHAT
document.getElementById("searchUser").addEventListener("change", function() {
  chatRoom = this.value;

  document.getElementById("chatBox").innerHTML = "";
  document.getElementById("typingStatus").innerText = "";

  loadMessages();
  listenTyping();
});

// TYPING DETECT
document.getElementById("message").addEventListener("input", () => {
  db.ref("typing/" + chatRoom + "/" + currentUser).set(true);

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    db.ref("typing/" + chatRoom + "/" + currentUser).remove();
  }, 1000);
});

// LISTEN TYPING
function listenTyping() {
  db.ref("typing/" + chatRoom).on("value", snap => {
    let data = snap.val();
    let typingDiv = document.getElementById("typingStatus");

    if (!data) {
      typingDiv.innerText = "";
      return;
    }

    let usersTyping = Object.keys(data).filter(u => u !== currentUser);

    typingDiv.innerText = usersTyping.length
      ? usersTyping.join(", ") + " is typing..."
      : "";
  });
}

// NEARBY USERS
function findNearby() {
  navigator.geolocation.getCurrentPosition(pos => {
    let lat1 = pos.coords.latitude;
    let lon1 = pos.coords.longitude;

    db.ref("users").once("value", snap => {
      let users = snap.val();
      let result = [];

      for (let key in users) {
        let u = users[key];
        let d = getDistance(lat1, lon1, u.lat, u.lng);

        if (d <= 50 && u.name !== currentUser) {
          result.push(u.name);
        }
      }

      alert("Nearby Users: " + result.join(", "));
    });
  });
}

// DISTANCE
function getDistance(lat1, lon1, lat2, lon2) {
  let R = 6371;
  let dLat = (lat2 - lat1) * Math.PI/180;
  let dLon = (lon2 - lon1) * Math.PI/180;

  let a = Math.sin(dLat/2)**2 +
          Math.cos(lat1*Math.PI/180) *
          Math.cos(lat2*Math.PI/180) *
          Math.sin(dLon/2)**2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// HOME
function goHome() {
  location.reload();
}

// RESET CHAT ON REFRESH
window.onload = () => {
  db.ref("chats").remove();
};
</script>

</body>
</html>
