<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fling Chat</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
/* (UNCHANGED STYLES — SAME AS YOUR CODE) */
body {margin:0;font-family:'Segoe UI', sans-serif;color:white;}
.dashboard {height:100vh;display:flex;justify-content:center;align-items:center;background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);}
.card {background: rgba(255,255,255,0.05);backdrop-filter: blur(15px);padding:40px;border-radius:20px;text-align:center;width:300px;box-shadow:0 10px 40px rgba(0,0,0,0.5);}
.card input {width:100%;padding:12px;border:none;border-radius:25px;background:#1e2a38;color:white;margin-bottom:20px;text-align:center;}
.card button {width:100%;padding:12px;border:none;border-radius:25px;background: linear-gradient(45deg, #2aabee, #0088cc);color:white;font-size:16px;cursor:pointer;}
.features {margin-top:15px;font-size:12px;color:#aaa;display:flex;justify-content:space-around;}
#chatUI {background:#0e1621;height:100vh;display:flex;flex-direction:column;}
.header {background:#17212b;padding:10px;display:flex;gap:10px;}
.header input {flex:1;padding:8px;border-radius:20px;border:none;background:#242f3d;color:white;}
.chat-box {flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;}
.msg {max-width:65%;padding:10px;margin:5px 0;border-radius:15px;}
.sent {background:#2b5278;align-self:flex-end;}
.received {background:#182533;align-self:flex-start;}
.tick {font-size:10px;text-align:right;opacity:0.7;}
.input-box {display:flex;padding:10px;background:#17212b;}
.input-box input {flex:1;padding:10px;border-radius:20px;border:none;background:#242f3d;color:white;}
.input-box button {margin-left:8px;padding:10px;border-radius:50%;border:none;background:#2aabee;color:white;}
.typing {font-size:12px;color:#aaa;padding-left:15px;}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
  <div class="card">
    <h1>💬 Fling Chat</h1>
    <p>Connect anonymously. Chat instantly.</p>
    <input id="username" placeholder="Enter your username">
    <button onclick="createUser()">Start Chatting</button>

    <div class="features">
      <span>✔ Real-time</span>
      <span>✔ Nearby</span>
      <span>✔ Anonymous</span>
    </div>
  </div>
</div>

<!-- CHAT UI -->
<div id="chatUI" style="display:none;">
  <div class="header">
    <button onclick="goHome()">🏠</button>
    <input id="searchUser" placeholder="Search user">
    <button onclick="findNearby()">📍</button>
  </div>

  <div id="chatBox" class="chat-box"></div>
  <div id="typingStatus" class="typing"></div>

  <div class="input-box">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
  databaseURL: "https://fling-chat-95e81-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = "";
let chatRoom = "";
let typingTimeout;

// CREATE USER
function createUser() {
  currentUser = document.getElementById("username").value;
  if (!currentUser) return alert("Enter username");

  navigator.geolocation.getCurrentPosition(pos => {
    db.ref("users/" + currentUser).set({
      name: currentUser,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    });

    // AUTO DELETE ON EXIT
    db.ref("users/" + currentUser).onDisconnect().remove();
  });

  document.getElementById("dashboard").style.display = "none";
  document.getElementById("chatUI").style.display = "flex";
}

// SEND MESSAGE
function sendMessage() {
  let msg = document.getElementById("message").value;
  if (!msg || !chatRoom) return;

  let id = Date.now();

  db.ref("chats/" + chatRoom + "/" + id).set({
    sender: currentUser,
    text: msg,
    status: "sent"
  });

  document.getElementById("message").value = "";
}

// LOAD MESSAGES
function loadMessages() {
  db.ref("chats/" + chatRoom).off();
  db.ref("chats/" + chatRoom).on("value", snapshot => {
    let data = snapshot.val();
    if (!data) {
      document.getElementById("chatBox").innerHTML = "";
      return;
    }

    let html = "";

    for (let id in data) {
      let msg = data[id];
      let type = msg.sender === currentUser ? "sent" : "received";

      if (msg.sender !== currentUser && msg.status === "sent") {
        db.ref("chats/" + chatRoom + "/" + id).update({ status: "delivered" });
      }

      let tick = msg.sender === currentUser
        ? (msg.status === "sent" ? "✔" : "✔✔")
        : "";

      html += `
        <div class="msg ${type}">
          ${msg.text}
          <div class="tick">${tick}</div>
        </div>
      `;
    }

    let chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = html;
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// 1-to-1 CHAT SYSTEM
document.getElementById("searchUser").addEventListener("change", function() {
  let otherUser = this.value.trim();
  if (!otherUser) return;

  chatRoom = [currentUser, otherUser].sort().join("_");

  loadMessages();
  listenTyping();
});

// TYPING
document.getElementById("message").addEventListener("input", () => {
  if (!chatRoom) return;

  db.ref("typing/" + chatRoom + "/" + currentUser).set(true);

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    db.ref("typing/" + chatRoom + "/" + currentUser).remove();
  }, 1000);
});

// LISTEN TYPING
function listenTyping() {
  db.ref("typing/" + chatRoom).off();
  db.ref("typing/" + chatRoom).on("value", snap => {
    let data = snap.val();
    let typingDiv = document.getElementById("typingStatus");

    if (!data) {
      typingDiv.innerText = "";
      return;
    }

    let usersTyping = Object.keys(data).filter(u => u !== currentUser);
    typingDiv.innerText = usersTyping.length
      ? usersTyping.join(", ") + " is typing..."
      : "";
  });
}

// NEARBY USERS
function findNearby() {
  navigator.geolocation.getCurrentPosition(pos => {
    let lat1 = pos.coords.latitude;
    let lon1 = pos.coords.longitude;

    db.ref("users").once("value", snap => {
      let users = snap.val();
      let result = [];

      for (let key in users) {
        let u = users[key];
        let d = getDistance(lat1, lon1, u.lat, u.lng);

        if (d <= 50 && u.name !== currentUser) {
          result.push(u.name);
        }
      }

      if (!result.length) {
        alert("No nearby users found");
        return;
      }

      let list = result.join(", ");
      let selected = prompt("Nearby Users:\n" + list + "\n\nType username:");

      if (selected && result.includes(selected)) {
        document.getElementById("searchUser").value = selected;

        chatRoom = [currentUser, selected].sort().join("_");

        loadMessages();
        listenTyping();
      }
    });
  });
}

// DISTANCE
function getDistance(lat1, lon1, lat2, lon2) {
  let R = 6371;
  let dLat = (lat2 - lat1) * Math.PI/180;
  let dLon = (lon2 - lon1) * Math.PI/180;

  let a = Math.sin(dLat/2)**2 +
          Math.cos(lat1*Math.PI/180) *
          Math.cos(lat2*Math.PI/180) *
          Math.sin(dLon/2)**2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// HOME
function goHome() {
  location.reload();
}
</script>

</body>
</html>
