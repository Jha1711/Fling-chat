<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fling Chat</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  color:white;
}

/* ===== DASHBOARD ===== */
.dashboard {
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.card {
  width:100%;
  max-width:380px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding:30px 20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.card input, .card button {
  width:100%;
}

/* ===== CHAT UI ===== */
#chatUI {
  height:100vh;
  display:flex;
  flex-direction:column;
  max-width:900px;
  margin:auto;
  width:100%;
}

.header {
  display:flex;
  gap:10px;
  padding:10px;
  background:#17212b;
}

.header input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#242f3d;
  color:white;
}

/* CHAT */
.chat-box {
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
}

.msg {
  max-width:75%;
  padding:10px;
  margin:5px 0;
  border-radius:15px;
  word-wrap:break-word;
}

.sent {
  background:#2b5278;
  align-self:flex-end;
}

.received {
  background:#182533;
  align-self:flex-start;
}

.input-box {
  display:flex;
  padding:10px;
  background:#17212b;
}

.input-box input {
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  background:#242f3d;
  color:white;
}

.input-box button {
  margin-left:8px;
  padding:12px;
  border-radius:50%;
  border:none;
  background:#2aabee;
  color:white;
}

/* MOBILE OPTIMIZATION */
@media (max-width:600px) {
  .card {
    padding:20px 15px;
  }

  .msg {
    max-width:85%;
    font-size:14px;
  }
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
  <div class="card">
    <h1>💬 Fling Chat</h1>
    <p>Connect anonymously. Chat instantly.</p>

    <input id="username" placeholder="Enter your username">
    <button onclick="createUser()">Start Chatting</button>
  </div>
</div>

<!-- CHAT UI -->
<div id="chatUI" style="display:none;">
  <div class="header">
    <button onclick="goHome()">🏠</button>
    <input id="searchUser" placeholder="Enter chat room name">
  </div>

  <div id="chatBox" class="chat-box"></div>
  <div id="typingStatus" style="font-size:12px;color:#aaa;padding-left:15px;"></div>

  <div class="input-box">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
  databaseURL: "https://fling-chat-95e81-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = "";
let chatRoom = "global";
let typingTimeout;

// CREATE USER (NO LOCATION STORAGE)
function createUser() {
  currentUser = document.getElementById("username").value;
  if (!currentUser) return alert("Enter username");

  document.getElementById("dashboard").style.display = "none";
  document.getElementById("chatUI").style.display = "flex";

  loadMessages();
  listenTyping();
}

// SEND MESSAGE
function sendMessage() {
  let msg = document.getElementById("message").value;
  if (!msg) return;

  let id = Date.now();

  db.ref("chats/" + chatRoom + "/" + id).set({
    sender: currentUser,
    text: msg,
    status: "sent"
  });

  document.getElementById("message").value = "";
}

// LOAD MESSAGES
function loadMessages() {
  db.ref("chats/" + chatRoom).on("value", snapshot => {
    let data = snapshot.val();
    if (!data) {
      document.getElementById("chatBox").innerHTML = "";
      return;
    }

    let html = "";

    for (let id in data) {
      let msg = data[id];
      let type = msg.sender === currentUser ? "sent" : "received";

      if (msg.sender !== currentUser && msg.status === "sent") {
        db.ref("chats/" + chatRoom + "/" + id).update({
          status: "delivered"
        });
      }

      let tick = msg.sender === currentUser
        ? (msg.status === "sent" ? "✔" : "✔✔")
        : "";

      html += `
        <div class="msg ${type}">
          ${msg.text}
          <div style="font-size:10px;text-align:right;">${tick}</div>
        </div>
      `;
    }

    let chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = html;
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// SEARCH USER → JUST SWITCH ROOM (NO HISTORY)
document.getElementById("searchUser").addEventListener("change", function() {
  chatRoom = this.value || "global";
  loadMessages();
  listenTyping();
});

// TYPING
document.getElementById("message").addEventListener("input", () => {
  db.ref("typing/" + chatRoom + "/" + currentUser).set(true);

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    db.ref("typing/" + chatRoom + "/" + currentUser).remove();
  }, 1000);
});

// LISTEN TYPING
function listenTyping() {
  db.ref("typing/" + chatRoom).on("value", snap => {
    let data = snap.val();
    let typingDiv = document.getElementById("typingStatus");

    if (!data) {
      typingDiv.innerText = "";
      return;
    }

    let usersTyping = Object.keys(data).filter(u => u !== currentUser);
    typingDiv.innerText = usersTyping.length
      ? usersTyping.join(", ") + " is typing..."
      : "";
  });
}

// HOME
function goHome() {
  location.reload();
}

// RESET CHAT
window.onload = () => {
  db.ref("chats").remove();
};
</script>

</body>
</html>
