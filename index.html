<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Chat App</title>

<style>
body {margin:0;font-family:Arial;background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;}
.app {width:360px;height:640px;background:#0d0d0d;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;}
.header {padding:15px;font-size:20px;font-weight:bold;}
.chat-list {flex:1;overflow-y:auto;}
.chat-item {display:flex;align-items:center;padding:12px;border-bottom:1px solid #111;cursor:pointer;}
.avatar {width:40px;height:40px;border-radius:50%;background:pink;margin-right:10px;}
.chat-info {flex:1;}
.chat-name {font-weight:bold;}
.chat-screen {display:none;flex-direction:column;height:100%;}
.chat-header {padding:15px;border-bottom:1px solid #111;cursor:pointer;}
.messages {flex:1;padding:10px;overflow-y:auto;}
.msg {max-width:70%;padding:10px;border-radius:10px;margin:5px 0;}
.sent {background:#d4f1a7;color:black;margin-left:auto;}
.received {background:#334155;}
.input-box {display:flex;padding:10px;border-top:1px solid #111;}
.input-box input {flex:1;padding:10px;border-radius:10px;border:none;background:#1a1a1a;color:white;}
.input-box button {margin-left:5px;padding:10px;border:none;border-radius:10px;background:#22c55e;color:white;}
.delete-btn {background:red;margin:5px;padding:5px;border:none;color:white;border-radius:5px;}
</style>
</head>
<body>

<div class="app">

<div id="listScreen">
  <div class="header">Global Users</div>
  <div id="userList" class="chat-list"></div>
</div>

<div id="chatScreen" class="chat-screen">
  <div id="chatTitle" class="chat-header" onclick="back()">⬅ Back</div>
  <button class="delete-btn" onclick="deleteChat()">Delete Chat</button>
  <div id="messages" class="messages"></div>

  <div class="input-box">
    <input id="msgInput" placeholder="Type message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "fling-chat-95e81.firebaseapp.com",
  databaseURL: "https://fling-chat-95e81-default-rtdb.firebaseio.com/",
  projectId: "fling-chat-95e81",
};

firebase.initializeApp(firebaseConfig);

const userId = "user_" + Math.floor(Math.random() * 100000);
const usersRef = firebase.database().ref("users");

let currentChat = "";
let db;

// Register user globally
usersRef.child(userId).set(true);

// Load all users globally
usersRef.on("value", snapshot => {
  const userList = document.getElementById("userList");
  userList.innerHTML = "";

  snapshot.forEach(child => {
    const id = child.key;
    if (id === userId) return;

    const div = document.createElement("div");
    div.className = "chat-item";
    div.innerHTML = `
      <div class="avatar"></div>
      <div class="chat-info">
        <div class="chat-name">${id}</div>
      </div>
    `;

    div.onclick = () => openChat(id);
    userList.appendChild(div);
  });
});

function openChat(otherUser) {
  currentChat = userId < otherUser ? userId + "_" + otherUser : otherUser + "_" + userId;
  db = firebase.database().ref("chats/" + currentChat);

  document.getElementById("listScreen").style.display = "none";
  document.getElementById("chatScreen").style.display = "flex";
  document.getElementById("chatTitle").innerText = "⬅ " + otherUser;

  const messagesDiv = document.getElementById("messages");
  messagesDiv.innerHTML = "";

  db.off();

  db.on("child_added", snapshot => {
    const data = snapshot.val();

    const div = document.createElement("div");
    div.classList.add("msg");

    if (data.sender === userId) div.classList.add("sent");
    else div.classList.add("received");

    div.innerText = data.text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

function sendMessage() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text || !db) return;

  db.push({ text, sender: userId });
  input.value = "";
}

function deleteChat() {
  if (!currentChat) return;
  firebase.database().ref("chats/" + currentChat).remove();
  document.getElementById("messages").innerHTML = "";
}

function back() {
  document.getElementById("listScreen").style.display = "block";
  document.getElementById("chatScreen").style.display = "none";
}
</script>

</body>
</html>
