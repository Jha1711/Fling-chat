<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Multi-Chat Rooms</title>

<style>
body {margin:0;font-family:Arial;background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;}
.app {width:360px;height:640px;background:#0d0d0d;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;}
.header {padding:15px;font-size:20px;font-weight:bold;background:#111;}
.username-screen {display:flex;flex-direction:column;flex:1;justify-content:center;align-items:center;}
.username-screen input, .username-screen select {padding:10px;width:80%;border-radius:10px;border:none;margin-bottom:10px;}
.username-screen button {padding:10px 20px;border:none;border-radius:10px;background:#22c55e;color:black;font-weight:bold;cursor:pointer;}
.chat-screen {display:none;flex-direction:column;height:100%;}
.messages {flex:1;padding:10px;overflow-y:auto;background:#121212;}
.msg {max-width:70%;padding:10px;border-radius:10px;margin:5px 0;word-wrap:break-word;position:relative;}
.sent {background:#22c55e;color:black;margin-left:auto;}
.received {background:#444;color:white;margin-right:auto;}
.msg-username {font-size:10px;color:gray;margin-bottom:2px;}
.tick {font-size:10px;color:gray;margin-left:5px;}
.input-box {display:flex;padding:10px;border-top:1px solid #333;}
.input-box input {flex:1;padding:10px;border-radius:10px;border:none;background:#1a1a1a;color:white;}
.input-box button {margin-left:5px;padding:10px;border:none;border-radius:10px;background:#22c55e;color:white;}
.call-box {display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #333;}
.call-box button {padding:5px 10px;border:none;border-radius:5px;color:white;cursor:pointer;}
#remoteAudio {display:none;}
</style>
</head>
<body>

<div class="app">

  <!-- Username & Room Entry -->
  <div id="usernameScreen" class="username-screen">
    <input id="usernameInput" placeholder="Enter your name..." />
    <select id="roomSelect">
      <option value="room1">Room 1</option>
      <option value="room2">Room 2</option>
      <option value="room3">Room 3</option>
    </select>
    <button onclick="enterChat()">Join Chat</button>
  </div>

  <!-- Chat Screen -->
  <div id="chatScreen" class="chat-screen">
    <div class="header" id="roomHeader">Chat Room</div>

    <!-- Audio Call Buttons -->
    <div class="call-box">
      <button id="startCallBtn" style="background:#3b82f6;">Start Call</button>
      <button id="endCallBtn" style="background:#ef4444;" disabled>End Call</button>
    </div>

    <div id="messages" class="messages"></div>

    <div class="input-box">
      <input id="msgInput" placeholder="Type a message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<audio id="remoteAudio" autoplay></audio>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "fling-chat-95e81.firebaseapp.com",
  databaseURL: "https://fling-chat-95e81-default-rtdb.firebaseio.com/",
  projectId: "fling-chat-95e81",
};
firebase.initializeApp(firebaseConfig);

let username = "", userId = "", currentRoom = "";
let db, onlineRef, callRef;

// DOM Elements
const messagesDiv = document.getElementById("messages");
const startCallBtn = document.getElementById("startCallBtn");
const endCallBtn = document.getElementById("endCallBtn");
const remoteAudio = document.getElementById("remoteAudio");

let localStream, peerConnection;
const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

// --- Enter Chat ---
function enterChat() {
  username = document.getElementById("usernameInput").value.trim();
  currentRoom = document.getElementById("roomSelect").value;
  if(!username) { alert("Enter a name"); return; }

  userId = "user_" + Math.floor(Math.random()*100000);

  db = firebase.database().ref("chatrooms/" + currentRoom + "/messages");
  onlineRef = firebase.database().ref("chatrooms/" + currentRoom + "/online");
  callRef = firebase.database().ref("chatrooms/" + currentRoom + "/calls");

  // Delete previous messages on new join
  db.remove();

  // Online status
  onlineRef.child(userId).set({username});
  onlineRef.child(userId).onDisconnect().remove();

  document.getElementById("roomHeader").innerText = "Room: " + currentRoom;
  document.getElementById("usernameScreen").style.display = "none";
  document.getElementById("chatScreen").style.display = "flex";

  loadMessages();
}

// --- Send Message ---
function sendMessage() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if(!text) return;

  const timestamp = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

  const msgRef = db.push({
    text, sender:userId, username, time:timestamp, delivered:false
  });

  input.value = "";
}

// --- Load Messages & Handle Ticks ---
function loadMessages() {
  db.on("child_added", snapshot => {
    const data = snapshot.val();
    const div = document.createElement("div");
    div.classList.add("msg");

    const nameDiv = document.createElement("div");
    nameDiv.classList.add("msg-username");
    nameDiv.innerText = data.sender === userId ? "You" : data.username;
    div.appendChild(nameDiv);

    const textDiv = document.createElement("div");
    textDiv.innerText = data.text + " (" + data.time + ")";
    div.appendChild(textDiv);

    if(data.sender === userId) {
      const tickDiv = document.createElement("span");
      tickDiv.classList.add("tick");
      tickDiv.innerText = data.delivered ? "✔✔" : "✔";
      div.appendChild(tickDiv);
      snapshot.ref.update({delivered:true});
    }

    div.classList.add(data.sender===userId?"sent":"received");
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

// --- Audio Call ---
async function startCall() {
  startCallBtn.disabled = true;
  endCallBtn.disabled = false;

  localStream = await navigator.mediaDevices.getUserMedia({audio:true});
  peerConnection = new RTCPeerConnection(config);
  localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
  peerConnection.ontrack = e => { remoteAudio.srcObject = e.streams[0]; };

  peerConnection.onicecandidate = event => {
    if(event.candidate) callRef.push({candidate:event.candidate.toJSON(), sender:userId});
  };

  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);
  callRef.push({type:"offer", sdp:offer.sdp, sender:userId});
}

async function endCall() {
  peerConnection?.close();
  localStream?.getTracks().forEach(track => track.stop());
  peerConnection = null;
  startCallBtn.disabled = false;
  endCallBtn.disabled = true;
  callRef.remove();
}

startCallBtn.onclick = startCall;
endCallBtn.onclick = endCall;

// --- Listen for incoming calls ---
callRef && callRef.on("child_added", async snapshot => {
  const data = snapshot.val();
  if(!peerConnection && data.type==="offer" && data.sender!==userId){
    peerConnection = new RTCPeerConnection(config);
    peerConnection.ontrack = e => { remoteAudio.srcObject = e.streams[0]; };

    localStream = await navigator.mediaDevices.getUserMedia({audio:true});
    localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

    peerConnection.onicecandidate = e=>{
      if(e.candidate) callRef.push({candidate:e.candidate.toJSON(), sender:userId});
    };

    await peerConnection.setRemoteDescription({type:"offer", sdp:data.sdp});
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    callRef.push({type:"answer", sdp:answer.sdp, sender:userId});

    startCallBtn.disabled = true;
    endCallBtn.disabled = false;
  }

  if(peerConnection && data.type==="answer" && data.sender!==userId){
    await peerConnection.setRemoteDescription({type:"answer", sdp:data.sdp});
  }

  if(peerConnection && data.candidate && data.sender!==userId){
    await peerConnection.addIceCandidate(data.candidate);
  }
});
</script>

</body>
</html>
