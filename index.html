<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Chat</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  background: #e5ddd5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.app {
  width: 400px;
  height: 700px;
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

/* Header */
.header {
  background: #075E54;
  color: white;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
  display: flex;
  align-items: center;
}

/* Search */
.search {
  padding: 10px;
  background: #f0f0f0;
}
.search input {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
  font-size: 14px;
}

/* Chat List */
.chat-list {
  flex: 1;
  overflow-y: auto;
  background: #f7f7f7;
}
.chat-item {
  display: flex;
  align-items: center;
  padding: 12px;
  border-bottom: 1px solid #e0e0e0;
  cursor: pointer;
  transition: background 0.2s;
}
.chat-item:hover {
  background: #e0f7fa;
}
.avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #ff4081;
  margin-right: 12px;
}
.chat-info {
  flex: 1;
}
.chat-name {
  font-weight: 500;
}
.chat-msg {
  font-size: 13px;
  color: gray;
  margin-top: 2px;
}
.time {
  font-size: 12px;
  color: gray;
}

/* Chat Screen */
.chat-screen {
  display: none;
  flex-direction: column;
  height: 100%;
  background: #ece5dd;
}

/* Chat Header */
.chat-header {
  padding: 15px;
  background: #075E54;
  color: white;
  font-weight: bold;
  display: flex;
  align-items: center;
  cursor: pointer;
}

/* Messages */
.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.msg {
  max-width: 70%;
  padding: 10px;
  border-radius: 10px;
  margin: 5px 0;
  position: relative;
  word-wrap: break-word;
}
.sent {
  background: #dcf8c6;
  align-self: flex-end;
}
.received {
  background: #fff;
  align-self: flex-start;
}

/* Timestamp */
.timestamp {
  font-size: 10px;
  color: gray;
  text-align: right;
  margin-top: 2px;
}

/* Input Box */
.input-box {
  display: flex;
  padding: 10px;
  border-top: 1px solid #ccc;
  background: #f0f0f0;
}
.input-box input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
  font-size: 14px;
}
.input-box button {
  margin-left: 5px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: #25D366;
  color: white;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="app">

  <!-- Chat List -->
  <div id="listScreen">
    <div class="header">Chats</div>
    <div class="search"><input placeholder="Search" /></div>
    <div class="chat-list">
      <div class="chat-item" onclick="openChat()">
        <div class="avatar"></div>
        <div class="chat-info">
          <div class="chat-name">Anonymous Room</div>
          <div class="chat-msg">Tap to chat</div>
        </div>
        <div class="time">Live</div>
      </div>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chatScreen" class="chat-screen">
    <div class="chat-header" onclick="back()">⬅ Back</div>
    <div id="messages" class="messages"></div>

    <div class="input-box">
      <input id="msgInput" placeholder="Type a message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "fling-chat-95e81.firebaseapp.com",
  databaseURL: "https://fling-chat-95e81-default-rtdb.firebaseio.com/",
  projectId: "fling-chat-95e81",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("chatroom");

// Random user ID
const userId = "user_" + Math.floor(Math.random() * 10000);

function openChat() {
  document.getElementById("listScreen").style.display = "none";
  document.getElementById("chatScreen").style.display = "flex";
}

function back() {
  document.getElementById("listScreen").style.display = "block";
  document.getElementById("chatScreen").style.display = "none";
}

function sendMessage() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text) return;

  const timestamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

  db.push({
    text: text,
    sender: userId,
    time: timestamp
  });

  input.value = "";
}

// Receive messages
const messagesDiv = document.getElementById("messages");

db.on("child_added", snapshot => {
  const data = snapshot.val();
  const div = document.createElement("div");
  div.classList.add("msg");

  if (data.sender === userId) {
    div.classList.add("sent");
  } else {
    div.classList.add("received");
  }

  div.innerHTML = data.text + `<div class="timestamp">${data.time}</div>`;
  messagesDiv.appendChild(div);

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});
</script>

</body>
</html>
