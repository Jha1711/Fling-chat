<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fling Chat</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body {margin:0;font-family:'Segoe UI', sans-serif;color:white;background:#0e1621;}
.dashboard {height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);}
.card {background:rgba(255,255,255,0.05);backdrop-filter:blur(15px);padding:40px;border-radius:20px;text-align:center;width:300px;}
.card input {width:100%;padding:12px;border:none;border-radius:25px;background:#1e2a38;color:white;margin-bottom:20px;text-align:center;}
.card button {width:100%;padding:12px;border:none;border-radius:25px;background:linear-gradient(45deg,#2aabee,#0088cc);color:white;}

#chatUI {display:none;height:100vh;flex-direction:column;}
.header {background:#17212b;padding:10px;display:flex;gap:10px;}
.header input {flex:1;padding:8px;border-radius:20px;border:none;background:#242f3d;color:white;}

#nearbyList {padding:10px;border-bottom:1px solid #222;max-height:120px;overflow-y:auto;}

.user {padding:8px;background:#1e2a38;margin:5px;border-radius:10px;cursor:pointer;}
.user:hover {background:#2b5278;}

.chat-box {flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;}
.msg {max-width:65%;padding:10px;margin:5px 0;border-radius:15px;}
.sent {background:#2b5278;align-self:flex-end;}
.received {background:#182533;align-self:flex-start;}
.tick {font-size:10px;text-align:right;}

.input-box {display:flex;padding:10px;background:#17212b;}
.input-box input {flex:1;padding:10px;border-radius:20px;border:none;background:#242f3d;color:white;}
.input-box button {margin-left:8px;padding:10px;border-radius:50%;border:none;background:#2aabee;color:white;}

.typing {font-size:12px;color:#aaa;padding-left:15px;}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
  <div class="card">
    <h1>💬 Fling Chat</h1>
    <input id="username" placeholder="Enter username">
    <button onclick="createUser()">Start</button>
  </div>
</div>

<!-- CHAT -->
<div id="chatUI">
  <div class="header">
    <button onclick="goHome()">🏠</button>
    <input placeholder="Nearby users auto shown">
    <button onclick="findNearby()">📍</button>
  </div>

  <div id="nearbyList"></div>

  <div id="chatBox" class="chat-box"></div>
  <div id="typingStatus" class="typing"></div>

  <div class="input-box">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
  databaseURL: "https://fling-chat-95e81-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = "";
let chatRoom = "";
let typingTimeout;

// CREATE USER
function createUser() {
  currentUser = document.getElementById("username").value;
  if (!currentUser) return alert("Enter username");

  navigator.geolocation.getCurrentPosition(pos => {
    db.ref("users/" + currentUser).set({
      name: currentUser,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      online: true
    });

    db.ref("users/" + currentUser).onDisconnect().remove();
  });

  document.getElementById("dashboard").style.display = "none";
  document.getElementById("chatUI").style.display = "flex";

  findNearby();
}

// START CHAT
function startChat(otherUser) {
  chatRoom = [currentUser, otherUser].sort().join("_");
  document.getElementById("chatBox").innerHTML = "";
  loadMessages();
  listenTyping();
}

// SEND MESSAGE
function sendMessage() {
  let msg = document.getElementById("message").value;
  if (!msg || !chatRoom) return;

  let id = Date.now();

  db.ref("chats/" + chatRoom + "/" + id).set({
    sender: currentUser,
    text: msg,
    status: "sent"
  });

  document.getElementById("message").value = "";
}

// LOAD MESSAGES
function loadMessages() {
  db.ref("chats/" + chatRoom).off();

  db.ref("chats/" + chatRoom).on("value", snapshot => {
    let data = snapshot.val();
    let html = "";

    if (!data) {
      document.getElementById("chatBox").innerHTML = "Start chatting...";
      return;
    }

    for (let id in data) {
      let msg = data[id];
      let type = msg.sender === currentUser ? "sent" : "received";

      if (msg.sender !== currentUser && msg.status === "sent") {
        db.ref("chats/" + chatRoom + "/" + id).update({status:"delivered"});
      }

      let tick = msg.sender === currentUser
        ? (msg.status === "sent" ? "✔" : "✔✔")
        : "";

      html += `
        <div class="msg ${type}">
          ${msg.text}
          <div class="tick">${tick}</div>
        </div>
      `;
    }

    let chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = html;
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// TYPING
document.getElementById("message").addEventListener("input", () => {
  if (!chatRoom) return;

  db.ref("typing/" + chatRoom + "/" + currentUser).set(true);

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    db.ref("typing/" + chatRoom + "/" + currentUser).remove();
  }, 1000);
});

// LISTEN TYPING
function listenTyping() {
  db.ref("typing/" + chatRoom).off();

  db.ref("typing/" + chatRoom).on("value", snap => {
    let data = snap.val();
    let typingDiv = document.getElementById("typingStatus");

    if (!data) {
      typingDiv.innerText = "";
      return;
    }

    let usersTyping = Object.keys(data).filter(u => u !== currentUser);
    typingDiv.innerText = usersTyping.length
      ? usersTyping.join(", ") + " is typing..."
      : "";
  });
}

// NEARBY USERS UI
function findNearby() {
  navigator.geolocation.getCurrentPosition(pos => {
    let lat1 = pos.coords.latitude;
    let lon1 = pos.coords.longitude;

    db.ref("users").on("value", snap => {
      let users = snap.val();
      let html = "";

      for (let key in users) {
        let u = users[key];
        let d = getDistance(lat1, lon1, u.lat, u.lng);

        if (d <= 50 && u.name !== currentUser) {
          html += `
            <div class="user" onclick="startChat('${u.name}')">
              🟢 ${u.name}
            </div>
          `;
        }
      }

      document.getElementById("nearbyList").innerHTML =
        html || "No nearby users";
    });
  });
}

// DISTANCE
function getDistance(lat1, lon1, lat2, lon2) {
  let R = 6371;
  let dLat = (lat2 - lat1) * Math.PI/180;
  let dLon = (lon2 - lon1) * Math.PI/180;

  let a = Math.sin(dLat/2)**2 +
          Math.cos(lat1*Math.PI/180) *
          Math.cos(lat2*Math.PI/180) *
          Math.sin(dLon/2)**2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// HOME
function goHome() {
  location.reload();
}
</script>

</body>
</html>
