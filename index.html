<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fling Chat</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b141a;
  color:white;
}

.header {
  background:#202c33;
  padding:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.header input {
  width:60%;
  padding:6px;
  border-radius:6px;
  border:none;
}

.chat-box {
  height:75vh;
  overflow-y:auto;
  padding:10px;
}

.msg {
  max-width:70%;
  padding:8px;
  margin:5px;
  border-radius:8px;
  position:relative;
}

.sent {
  background:#005c4b;
  margin-left:auto;
}

.received {
  background:#202c33;
}

.tick {
  font-size:10px;
  position:absolute;
  bottom:2px;
  right:5px;
}

.input-box {
  display:flex;
  padding:10px;
  background:#202c33;
}

.input-box input {
  flex:1;
  padding:8px;
  border-radius:6px;
  border:none;
}

.input-box button {
  margin-left:5px;
  padding:8px 12px;
  background:#00a884;
  border:none;
  border-radius:6px;
  color:white;
}

.dashboard {
  text-align:center;
  padding:20px;
}
button {
  cursor:pointer;
}
</style>
</head>

<body>

<div id="dashboard" class="dashboard">
  <h2>Fling Chat</h2>
  <input id="username" placeholder="Enter username"><br><br>
  <button onclick="createUser()">Enter Chat</button>
</div>

<div id="chatUI" style="display:none;">
  <div class="header">
    <button onclick="goHome()">🏠</button>
    <input id="searchUser" placeholder="Search user">
    <button onclick="findNearby()">📍</button>
  </div>

  <div id="chatBox" class="chat-box"></div>

  <div class="input-box">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
// 🔥 Firebase Config
const firebaseConfig = {
  databaseURL: "https://fling-chat-95e81-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🧠 VARIABLES
let currentUser = "";
let chatRoom = "global";

// 🚀 CREATE USER
function createUser() {
  currentUser = document.getElementById("username").value;
  if (!currentUser) return alert("Enter username");

  navigator.geolocation.getCurrentPosition(pos => {
    db.ref("users/" + currentUser).set({
      name: currentUser,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    });
  });

  document.getElementById("dashboard").style.display = "none";
  document.getElementById("chatUI").style.display = "block";

  loadMessages();
}

// 💬 SEND MESSAGE
function sendMessage() {
  let msg = document.getElementById("message").value;
  if (!msg) return;

  let id = Date.now();

  db.ref("chats/" + chatRoom + "/" + id).set({
    sender: currentUser,
    text: msg,
    status: "sent"
  });

  document.getElementById("message").value = "";
}

// 📩 LOAD MESSAGES
function loadMessages() {
  db.ref("chats/" + chatRoom).on("value", snapshot => {
    let data = snapshot.val();
    let html = "";

    for (let id in data) {
      let msg = data[id];
      let type = msg.sender === currentUser ? "sent" : "received";

      // Update to delivered
      if (msg.sender !== currentUser && msg.status === "sent") {
        db.ref("chats/" + chatRoom + "/" + id).update({
          status: "delivered"
        });
      }

      let tick = "";
      if (msg.sender === currentUser) {
        tick = msg.status === "sent" ? "✔" : "✔✔";
      }

      html += `
        <div class="msg ${type}">
          ${msg.text}
          <div class="tick">${tick}</div>
        </div>
      `;
    }

    document.getElementById("chatBox").innerHTML = html;
    document.getElementById("chatBox").scrollTop = 999999;
  });
}

// 🔍 SEARCH USER
document.getElementById("searchUser").addEventListener("change", function() {
  let user = this.value;
  chatRoom = user;
  loadMessages();
});

// 📍 FIND NEARBY USERS (50KM)
function findNearby() {
  navigator.geolocation.getCurrentPosition(pos => {
    let lat1 = pos.coords.latitude;
    let lon1 = pos.coords.longitude;

    db.ref("users").once("value", snap => {
      let users = snap.val();
      let result = [];

      for (let key in users) {
        let u = users[key];
        let d = getDistance(lat1, lon1, u.lat, u.lng);

        if (d <= 50 && u.name !== currentUser) {
          result.push(u.name);
        }
      }

      alert("Nearby Users: " + result.join(", "));
    });
  });
}

// 📏 DISTANCE CALCULATION
function getDistance(lat1, lon1, lat2, lon2) {
  let R = 6371;
  let dLat = (lat2 - lat1) * Math.PI / 180;
  let dLon = (lon2 - lon1) * Math.PI / 180;

  let a = Math.sin(dLat/2) * Math.sin(dLat/2) +
          Math.cos(lat1*Math.PI/180) *
          Math.cos(lat2*Math.PI/180) *
          Math.sin(dLon/2) *
          Math.sin(dLon/2);

  let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// 🏠 BACK HOME
function goHome() {
  location.reload();
}

// 🧹 DELETE CHAT ON REFRESH
window.onload = () => {
  db.ref("chats").remove();
};
</script>

</body>
</html>
